name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos and Tools
        run: |
          # 1. Cài đặt công cụ ký mã
          brew install ldid dpkg
          
          # 2. Thiết lập đường dẫn Theos
          export THEOS=$HOME/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
          # 3. Tải Theos Framework
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 4. Xóa thư mục sdks cũ và tải bộ SDK mới
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Compile Project
        run: |
          # Bắt đầu biên dịch
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Result
          path: packages/*.ipa
