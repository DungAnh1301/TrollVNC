name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Tự động tải các thư viện con đi kèm

      - name: Install Dependencies
        run: |
          # Cài đặt các công cụ cần thiết để biên dịch thư viện C
          brew install theos ldid xz
          
      - name: Setup Theos
        run: |
          # Thiết lập Theos đúng cách
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $USER /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
      - name: Setup iOS SDK
        run: |
          # Tải SDK iOS 14.5 (phổ biến và ổn định cho build)
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Compile Project
        run: |
          # Lệnh biên dịch chính
          make package FINALPACKAGE=1
        env:
          THEOS: /opt/theos

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-IPA
          path: packages/*.ipa
