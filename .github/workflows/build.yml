name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          brew install ldid dpkg

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Compile Project
        run: |
          # 1. Chạy lệnh biên dịch
          make package FINALPACKAGE=1
          
          # 2. Tạo thư mục để gom file
          mkdir -p collect_results
          
          # 3. Tìm TẤT CẢ các file có đuôi .deb hoặc .ipa trong toàn bộ dự án và copy vào collect_results
          find . -name "*.deb" -exec cp {} collect_results/ \;
          find . -name "*.ipa" -exec cp {} collect_results/ \;
          
          # 4. Hiển thị danh sách file để "bắt quả tang" vị trí file
          echo "--- DANH SÁCH FILE TÌM THẤY ---"
          ls -R collect_results
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Output
          path: collect_results/*
