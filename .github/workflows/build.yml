name: Build TrollVNC for Employees

on:
  workflow_dispatch:
    inputs:
      desktop_name:
        description: 'Tên hiển thị cho nhân viên (VD: NV-01)'
        default: 'TrollVNC-Staff'
        required: true

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        # Chúng ta chỉ tập trung build bản bootstrap (cho TrollStore) để tiết kiệm thời gian
        scheme: ["bootstrap"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: brew install ldid dpkg xcbeautify

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Build Package
        run: |
          # Chạy lệnh build theo đúng sơ đồ bootstrap của tác giả
          # FINALPACKAGE=1 giúp đóng gói file cài đặt hoàn chỉnh
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}
          TVNC_DESKTOP_NAME: ${{ github.event.inputs.desktop_name }}

      - name: Prepare and Force IPA
        run: |
          mkdir -p output_staff
          # Tìm file .tipa (định dạng TrollStore của dự án này)
          find . -name "*.tipa" -exec cp {} output_staff/TrollVNC_Staff.ipa \;
          # Nếu không thấy .tipa, tìm file .deb rồi đổi sang .ipa
          find . -name "*.deb" -exec cp {} output_staff/TrollVNC_Staff.deb \;
        
      - name: Upload for Staff
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Employee-Version
          path: output_staff/*
