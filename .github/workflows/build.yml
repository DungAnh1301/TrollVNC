name: Build TrollVNC - Force Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: brew install ldid dpkg cmake

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Build LibVNCServer from Source
        run: |
          # Bước này tự tạo ra linh kiện chuẩn, không dùng hàng có sẵn bị lỗi
          git clone https://github.com/LibVNC/libvncserver.git
          cd libvncserver
          mkdir build && cd build
          cmake .. -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64
          make libvncserver
          mkdir -p ../../lib
          cp libvncserver/libvncserver.a ../../lib/
          cd ../..

      - name: Build and Package
        run: |
          # Xóa cache cũ và build
          make clean package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Force IPA Creation
        if: always()
        run: |
          mkdir -p final_ipa
          # Tìm file .tipa hoặc .ipa
          find packages -name "*.tipa" -exec cp {} final_ipa/TrollVNC.ipa \;
          find packages -name "*.ipa" -exec cp {} final_ipa/TrollVNC.ipa \;
          
          # Nếu không thấy, tự đóng gói thư mục .app
          APP_PATH=$(find .theos/obj -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -vr final_ipa/TrollVNC_Manual.ipa Payload/
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Final-IPA
          path: final_ipa/*
