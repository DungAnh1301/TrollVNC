name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          brew install ldid dpkg

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Compile and Force IPA
        run: |
          # 1. Biên dịch dự án
          make package FINALPACKAGE=1
          
          # 2. Tìm kiếm file .deb (thường là kết quả của make package)
          DEB_FILE=$(find . -name "*.deb" | head -n 1)
          
          if [ -z "$DEB_FILE" ]; then
            echo "Không tìm thấy file .deb, cố gắng tìm thư mục .app..."
            APP_PATH=$(find . -name "*.app" -type d | grep -v "theos" | head -n 1)
            if [ -n "$APP_PATH" ]; then
              echo "Tìm thấy thư mục ứng dụng tại: $APP_PATH"
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -vr TrollVNC.ipa Payload/
            fi
          else
            echo "Đã tìm thấy file .deb: $DEB_FILE. Đang chuyển sang .ipa..."
            # Giải nén deb để lấy thư mục .app và đóng gói lại thành ipa
            mkdir -p temp_deb
            dpkg-deb -x "$DEB_FILE" temp_deb/
            mkdir -p Payload
            cp -r temp_deb/Applications/*.app Payload/
            zip -vr TrollVNC.ipa Payload/
          fi
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Final-IPA
          path: "*.ipa"
