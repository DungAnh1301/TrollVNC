name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Basic Tools
        run: |
          # Chỉ cài ldid để ký mã, không cài 'theos' qua brew nữa
          brew install ldid

      - name: Setup Theos Framework
        run: |
          # Tải Theos thủ công vào thư mục người dùng
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          # Tải bộ thư viện lập trình iOS
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Compile Project
        run: |
          # Lệnh biên dịch quan trọng nhất
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload IPA Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-IPA
          path: packages/*.ipa
