name: Build TrollVNC - Ultimate Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: brew install ldid dpkg

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Build Package
        run: |
          # Xóa file lib cũ gây lỗi nếu có
          rm -rf lib/libvncserver.a
          
          # Cố gắng biên dịch
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Manual Packaging (If make fails)
        if: always()
        run: |
          mkdir -p final_ipa
          # Tìm file .app trong thư mục tạm của Theos
          APP_PATH=$(find .theos/obj -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at $APP_PATH. Packaging manually..."
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -vr final_ipa/TrollVNC.ipa Payload/
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Result
          path: |
            packages/*.ipa
            packages/*.tipa
            final_ipa/*.ipa
