name: Build TrollVNC - Professional Auto-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: brew install ldid dpkg cmake xcbeautify

      - name: Setup Theos & SDK
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          git clone https://github.com/theos/sdks.git $THEOS/sdks
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build LibVNCServer from Source
        run: |
          # Bước này tự tạo ra thư viện chuẩn arm64, không lo lỗi "unknown file type"
          git clone https://github.com/LibVNC/libvncserver.git
          cd libvncserver
          mkdir build && cd build
          cmake .. -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64
          make -j$(sysctl -n hw.ncpu)
          cp libvncserver/libvncserver.a ../../lib/
          cd ../..

      - name: Compile TrollVNC
        run: |
          # Xóa cache cũ và build mới hoàn toàn
          make clean package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Package IPA Manually
        if: always()
        run: |
          mkdir -p final_output
          # Tìm file sản phẩm
          find packages -name "*.tipa" -exec cp {} final_output/TrollVNC.ipa \;
          find packages -name "*.deb" -exec cp {} final_output/TrollVNC.deb \;
          
          # Cứu vãn: Nếu không thấy file đóng gói, tự nén thư mục .app
          APP_PATH=$(find .theos/obj -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -vr final_output/TrollVNC_Manual.ipa Payload/
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Final-Build
          path: final_output/*
