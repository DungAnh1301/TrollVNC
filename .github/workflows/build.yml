name: Build TrollVNC - Final Solution

on:
  push:
    branches: [release]
  workflow_dispatch:
    inputs:
      is_managed:
        type: boolean
        description: Build with a bundled Managed.plist (managed configuration)
        default: true
      desktop_name:
        type: string
        description: Desktop name shown to clients
        default: TrollVNC-Staff
      port:
        type: string
        description: VNC TCP port
        default: "5901"
      view_only:
        type: boolean
        description: Global view-only
        default: false

env:
  FINALPACKAGE: 1
  THEOS: ${{ github.workspace }}/theos-roothide

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        # Chỉ tập trung vào bootstrap (TrollStore) để đảm bảo thành công nhanh nhất
        scheme: ["bootstrap"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install xcbeautify ldid-procursus p7zip make
          # Tạo thư mục lib nếu chưa có để chứa thư viện quan trọng
          mkdir -p lib

      - name: Checkout roothide/theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos-roothide
          submodules: recursive

      - name: Install iOS SDKs
        run: |
          cd theos-roothide
          # Tải SDK thủ công để đảm bảo không lỗi server tải tự động
          git clone https://github.com/theos/sdks.git sdks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Fix Missing Library (CRITICAL)
        run: |
          # Tải thư viện libvncserver.a - Nếu thiếu file này build sẽ thất bại
          curl -L https://github.com/OwnGoalStudio/BuildVNCServer/releases/download/v1.0/libvncserver.a -o lib/libvncserver.a
          echo "Library injected successfully."

      - name: Generate Managed.plist
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.is_managed == true }}
        run: |
          # Giả lập script tạo plist nếu file script gốc không chạy được
          mkdir -p devkit
          bash devkit/gen-managed-plist.sh || echo "Manual plist skip"
        env:
          TVNC_DESKTOP_NAME: ${{ inputs.desktop_name }}
          TVNC_PORT: ${{ inputs.port }}
          TVNC_VIEW_ONLY: ${{ inputs.view_only }}
          TVNC_ENABLED: true

      - name: Build package
        run: |
          # Nạp môi trường build
          source devkit/${{ matrix.scheme }}.sh
          # Cưỡng ép biên dịch sạch
          gmake clean package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos-roothide

      - name: Force IPA Creation
        run: |
          mkdir -p final_ipa
          # 1. Tìm file .tipa hoặc .ipa được tạo ra tự động
          find packages -name "*.tipa" -exec cp {} final_ipa/TrollVNC_TrollStore.ipa \;
          find packages -name "*.ipa" -exec cp {} final_ipa/TrollVNC_TrollStore.ipa \;
          
          # 2. Nếu vẫn không thấy (lỗi đóng gói của Theos), ta tự đóng gói từ file .app
          if [ ! -f final_ipa/TrollVNC_TrollStore.ipa ]; then
            echo "IPA not found, starting manual bundle..."
            APP_PATH=$(find .theos/obj -name "*.app" -type d | head -n 1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -vr final_ipa/TrollVNC_Manual.ipa Payload/
            fi
          fi

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Final-IPA
          path: final_ipa/*
