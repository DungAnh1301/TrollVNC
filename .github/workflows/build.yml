name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          # Chỉ cài các công cụ hỗ trợ có sẵn
          brew install ldid xz

      - name: Setup Theos
        run: |
          # Tải bộ khung Theos thủ công
          export THEOS=/Users/runner/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          # Tải bộ thư viện iOS SDK
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Compile Project
        run: |
          # Bắt đầu biên dịch
          make package FINALPACKAGE=1
        env:
          THEOS: /Users/runner/theos

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-IPA
          path: packages/*.ipa
