name: Build TrollVNC - Fix Lib Error

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: brew install ldid dpkg

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Remove Corrupted Library and Download New One
        run: |
          # Xóa bỏ file gây lỗi 'unknown file type'
          rm -f lib/libvncserver.a
          mkdir -p lib
          # Tải bản libvncserver chuẩn dành cho iOS arm64
          curl -L "https://github.com/OwnGoalStudio/BuildVNCServer/releases/download/v1.0/libvncserver.a" -o lib/libvncserver.a
          echo "Đã thay thế file lib thành công."

      - name: Build Package
        run: |
          # Biên dịch lại từ đầu
          make clean package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Collect Results
        if: always()
        run: |
          mkdir -p final_output
          # Tìm file sản phẩm (TIPA cho TrollStore hoặc DEB)
          find packages -name "*.tipa" -exec cp {} final_output/TrollVNC.ipa \;
          find packages -name "*.deb" -exec cp {} final_output/TrollVNC.deb \;
          
          # Nếu Theos lỗi không ra file đóng gói, ta tự đóng gói từ thư mục .app
          APP_PATH=$(find .theos/obj -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -vr final_output/TrollVNC_Manual.ipa Payload/
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Final-IPA
          path: final_output/*
