name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          # Tải Theos trực tiếp, không dùng brew để tránh lỗi
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          # Tải SDK cần thiết để biên dịch
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Compile Project
        run: |
          # Lệnh thực hiện biên dịch
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Result
          path: packages/*.ipa
