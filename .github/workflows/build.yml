name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos and Tools
        run: |
          # 1. Cài đặt công cụ hệ thống
          brew install ldid dpkg
          
          # 2. Tải Theos
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 3. Tải SDK
          git clone https://github.com/theos/sdks.git $THEOS/sdks
          
          # 4. Lưu biến môi trường cho các bước sau
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Compile Project
        run: |
          # Gọi lệnh biên dịch với đường dẫn Theos cụ thể
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Result
          path: packages/*.ipa
