name: Build TrollVNC IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          brew install ldid dpkg

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          # Tải Theos chính
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          # 1. Tải SDK vào một thư mục tạm để tránh lỗi 'already exists'
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          
          # 2. Xóa thư mục sdks cũ (nếu có) bên trong Theos
          rm -rf $HOME/theos/sdks
          
          # 3. Di chuyển SDK từ thư mục tạm vào đúng vị trí
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Compile Project
        run: |
          # 1. Chạy lệnh biên dịch chính
          make package FINALPACKAGE=1
          
          # 2. Tìm kiếm tất cả các file kết quả (.ipa hoặc .deb) và đưa vào một chỗ
          mkdir -p output_files
          find . -name "*.ipa" -exec cp {} output_files/ \;
          find . -name "*.deb" -exec cp {} output_files/ \;
          
          # 3. Hiện danh sách file tìm được để kiểm tra trong Log
          echo "Các file đã tìm thấy:"
          ls -R output_files
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Packages
          # Lấy tất cả file trong thư mục output_files vừa tạo
          path: output_files/*
