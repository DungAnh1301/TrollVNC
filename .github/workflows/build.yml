name: Build TrollVNC Force IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: brew install ldid dpkg

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/temporary_sdks
          rm -rf $HOME/theos/sdks
          mv $HOME/temporary_sdks $HOME/theos/sdks

      - name: Fix Missing Library
        run: |
          # Tải thư viện quan trọng nhất mà dự án đang thiếu
          mkdir -p lib
          curl -L https://github.com/OwnGoalStudio/BuildVNCServer/releases/download/v1.0/libvncserver.a -o lib/libvncserver.a
          echo "Đã tải xong thư viện libvncserver.a"

      - name: Build and Force Package
        run: |
          # 1. Chạy lệnh biên dịch
          make package FINALPACKAGE=1
          
          # 2. Tạo thư mục gom hàng
          mkdir -p final_output
          
          # 3. Tìm file .tipa hoặc .deb
          find . -name "*.tipa" -exec cp {} final_output/TrollVNC.ipa \;
          find . -name "*.deb" -exec cp {} final_output/TrollVNC.deb \;
          
          # 4. Nếu vẫn không thấy file đóng gói sẵn, ta tự đóng gói từ thư mục .app
          APP_PATH=$(find .theos/obj -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
             echo "Tìm thấy app tại $APP_PATH, đang đóng gói thủ công..."
             mkdir -p Payload
             cp -r "$APP_PATH" Payload/
             zip -vr final_output/TrollVNC_Manual.ipa Payload/
          fi
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TrollVNC-Final-Result
          path: final_output/*
